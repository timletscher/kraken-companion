<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kraken Companion Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="brand">
          <img
            class="brand-logo"
            src="Seattle-Kraken-Logo-1536x948.png"
            alt="Seattle Kraken logo"
          />
          <div class="brand-text">
            <h1>Kraken Companion</h1>
            <p class="hero-copy">Real-time rules.</p>
          </div>
        </div>
      </header>

      <section class="video-stage" aria-label="Video placeholder">
        <div class="video-frame">
          <div class="video-overlay">
            <span class="video-label">Explainer Video</span>
            <span class="video-meta">16:9 Placeholder</span>
          </div>
        </div>
        <div class="video-accent" aria-hidden="true"></div>
      </section>

      <section class="status">
        <div class="status-card">
          <div class="status-dot"></div>
          <div>
            <p class="status-title">Listening for game events...</p>
            <p class="status-subtitle">Manual triggers coming next.</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
