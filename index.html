<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kraken Companion Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="brand">
          <img
            class="brand-logo"
            src="Seattle-Kraken-Logo-1536x948.png"
            alt="Seattle Kraken logo"
          />
          <div class="brand-text">
            <p class="brand-kicker">Kraken Companion</p>
            <h1>Offsides Explained</h1>
            <p class="hero-copy">Real-time rules.</p>
          </div>
        </div>
      </header>

      <section class="video-stage" aria-label="Explainer video">
        <div class="video-frame">
          <video
            class="video-player"
            src="Hockey_offsides_explainer_video_33bdb0c776.mp4"
            autoplay
            muted
            playsinline
          ></video>
        </div>
        <div class="video-accent" aria-hidden="true"></div>
      </section>

      <section class="status">
        <div class="status-card">
          <div class="status-dot"></div>
          <div>
            <p class="status-title">Listening for game events...</p>
            <p class="status-subtitle">
              Offsides results in a faceoff in the neutral zone (middle section
              of the ice).
            </p>
          </div>
        </div>
      </section>
    </main>

    <div class="modal" id="feedback-modal" role="dialog" aria-modal="true">
      <div class="modal-card" role="document">
        <button class="modal-close" type="button" aria-label="Close">X</button>
        <div class="modal-content" id="feedback-content">
          <p class="modal-title">Was this helpful?</p>
          <div class="modal-actions">
            <button class="modal-button" type="button" data-action="replay">
              REPLAY
            </button>
            <button class="modal-button" type="button" data-action="helpful">
              HELPFUL
            </button>
            <button class="modal-button" type="button" data-action="unhelpful">
              UNHELPFUL
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const video = document.querySelector('.video-player');
      const modal = document.getElementById('feedback-modal');
      const modalContent = document.getElementById('feedback-content');
      const modalClose = document.querySelector('.modal-close');

      let modalShown = false;

      const showModal = () => {
        modal.classList.add('is-visible');
      };

      const hideModal = () => {
        modal.classList.remove('is-visible');
      };

      const resetModal = () => {
        modalContent.innerHTML = `
          <p class="modal-title">Was this helpful?</p>
          <div class="modal-actions">
            <button class="modal-button" type="button" data-action="replay">
              REPLAY
            </button>
            <button class="modal-button" type="button" data-action="helpful">
              HELPFUL
            </button>
            <button class="modal-button" type="button" data-action="unhelpful">
              UNHELPFUL
            </button>
          </div>
        `;
      };

      const setThankYou = () => {
        modalContent.innerHTML = `
          <p class="modal-title">Thank you for the feedback.</p>
          <p class="modal-message">Now back to the game. Go Kraken!</p>
        `;
      };

      video.addEventListener('timeupdate', () => {
        if (!modalShown && video.currentTime >= 8) {
          modalShown = true;
          showModal();
        }
      });

      modal.addEventListener('click', (event) => {
        const action = event.target?.dataset?.action;
        if (!action) {
          return;
        }

        if (action === 'replay') {
          hideModal();
          resetModal();
          modalShown = false;
          video.currentTime = 0;
          video.play();
          return;
        }

        setThankYou();
      });

      modalClose.addEventListener('click', () => {
        hideModal();
        resetModal();
      });
    </script>
  </body>
</html>
